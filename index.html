<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>My Song List</title>
  <style>
    /* 変数の定義 */
    :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #bb86fc; --primary: #03dac6; --error: #cf6679; --success: #28a745; --border: #333; }

    body { 
      font-family: 'Segoe UI', sans-serif; 
      color: var(--text); 
      margin: 0; padding: 0; 
      display: flex; flex-direction: column; 
      height: 100vh; box-sizing: border-box; 
      overflow: hidden;
      
      /* --- 背景画像の設定 --- */
      /* ※ファイル名が正しいか確認してください。?raw=trueを末尾につけています */
      background-image: url("7808d4bc-bbc7-446e-85a7-ea2b581164bb.jpg?raw=true");
      background-repeat: no-repeat;
      background-position: center;
      background-size: 60%; 
      background-attachment: fixed;
      background-color: var(--bg); /* 画像がない場所の色 */
    }

    /* 背景を「うっすら」させるためのオーバーレイ */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(18, 18, 18, 0.85); 
      z-index: -1;
    }

    .header-fixed { background: #1a1a1a; padding: 10px 15px; border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 100; }
    .header-row { display: flex; justify-content: space-between; align-items: center; height: 44px; }
    
    /* 花宮タイトルのデザイン調整 */
    #guestTitle { 
      font-size: 28px; /* 18pxから28pxにアップ */
      font-weight: 900; 
      color: var(--accent); 
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(187, 134, 252, 0.3);
    }

    #timerDisplay { font-size: 30px; font-weight: bold; font-family: monospace; color: var(--primary); display: none; }
    .admin-only { display: none; }
    #loginBtn { background: transparent; color: #666; border: 1px solid #444; padding: 5px 12px; border-radius: 5px; font-size: 12px; cursor: pointer; }
    #actionBtn { background: var(--success); color: white; border: none; padding: 8px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; }
    #actionBtn.active { background: var(--error); }
    .view-selector { display: none; background: #252525; border-radius: 10px; padding: 3px; margin-top: 10px; gap: 4px; }
    .view-tab { flex: 1; display: flex; align-items: center; justify-content: center; padding: 8px; font-size: 13px; font-weight: bold; border-radius: 8px; cursor: pointer; color: #888; }
    .view-tab.active { background: var(--card); color: var(--accent); }
    .content-area { flex-grow: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
    .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; padding: 0 10px; box-sizing: border-box; }
    .page.active { display: flex; }
    #tabContainer { display: flex; overflow-x: auto; gap: 8px; padding: 12px 0; border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10; -webkit-overflow-scrolling: touch; }
    .artist-tab { padding: 8px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; font-size: 12px; white-space: nowrap; cursor: pointer; color: #888; }
    .artist-tab.active { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); }
    #searchBox { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: white; font-size: 16px; margin: 10px 0; outline: none; box-sizing: border-box; flex-shrink: 0; }
    #songList { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-bottom: 20px; }
    .songBtn { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; width: 100%; cursor: pointer; }
    .btn-main { display: flex; flex-direction: column; flex: 1; text-align: left; overflow: hidden; }
    .btn-title { font-size: 15px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-artist { font-size: 11px; color: #888; }
    .btn-date { font-size: 12px; color: var(--accent); font-family: monospace; margin-left: 10px; white-space: nowrap; }
    .add-section { background: #252525; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #444; flex-shrink: 0; margin-top: 10px; }
    .add-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .add-row input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #000; color: white; font-size: 13px; }
    .add-row select { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #000; color: white; font-size: 13px; width: 100px; }
    .add-btn { width: 100%; padding: 12px; border-radius: 5px; background: var(--primary); color: black; font-weight: bold; border: none; cursor: pointer; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; color: var(--accent); }
    .modal-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .request-item { display: flex; align-items: center; background: #252525; padding: 12px; border-radius: 10px; border: 1px solid #333; gap: 10px; }
    .del-btn { background: var(--error); color: white; border: none; border-radius: 5px; padding: 8px 12px; font-size: 12px; cursor: pointer; }
    .confirm-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 4000; }
    .confirm-card { background: var(--card); padding: 25px; border-radius: 20px; width: 85%; text-align: center; border: 1px solid var(--accent); }
    #resultArea { width: 100%; flex-grow: 1; background: #000; color: #0f0; border: none; padding: 15px; font-family: monospace; border-radius: 10px; margin: 10px 0; resize: none; }
    #loadingOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center; z-index:9999; color:white; font-weight:bold; }
  </style>
</head>
<body>
  <div id="loadingOverlay">読み込み中...</div>
  <div class="header-fixed">
    <div class="header-row">
      <div id="timerDisplay">00:00</div>
      <div id="guestTitle">花宮</div>
      <div style="display:flex; gap:10px; align-items:center;">
        <div class="admin-only" id="adminControls" style="gap:10px; align-items:center;">
          <button id="requestBtn" onclick="openRequestModal()" style="background:#333; border:none; border-radius:50%; width:40px; height:40px; position:relative; display:flex; align-items:center; justify-content:center; cursor:pointer;">📩<span id="requestBadge" style="position:absolute; top:-5px; right:-5px; background:var(--error); color:white; border-radius:50%; padding:2px 6px; font-size:10px; display:none;">0</span></button>
          <button id="actionBtn" onclick="handleAction()">🎥 START</button>
        </div>
        <button id="loginBtn" onclick="tryLogin()">ログイン</button>
      </div>
    </div>
    <div id="adminTabNav" class="view-selector admin-only">
      <div id="nav-music" class="view-tab active" onclick="switchView('music')">🎵 曲選択</div>
      <div id="nav-log" class="view-tab" onclick="switchView('log')">📋 記録/追加</div>
    </div>
  </div>
  <script>
    // ※ここにあなたのGASのURLを入れてください（コード内に残っているはずです）
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzSV8jokY9LLVLn3ylFoHOHbE7qOZ-zgie0f9S-fTczyd_LQKBLs68FlA8DFLf3gai-rQ/exec";
    
    // （以下、前のJavaScriptをそのまま貼り付け）
    let IS_ADMIN = false;
    const ADMIN_PASS = "0000"; 
    let startTime = null, isRunning = false, allSongs = [], currentRequests = [], currentTab = "すべて";
    const OHMORI_GROUP = ["Mrs. GREEN APPLE", "Siip", "大森元貴"];

    async function callGAS(params, showLoading = false) {
      if (showLoading) document.getElementById('loadingOverlay').style.display = 'flex';
      const queryString = new URLSearchParams(params).toString();
      try {
        const response = await fetch(`${GAS_URL}?${queryString}`);
        const data = await response.json();
        return data;
      } catch (e) {
        console.error("GAS通信エラー:", e);
        if (showLoading) alert("通信に失敗しました。");
      } finally {
        if (showLoading) document.getElementById('loadingOverlay').style.display = 'none';
      }
    }

    window.onload = () => {
      const loggedIn = localStorage.getItem('isAdminLoggedIn') === 'true';
      applyAdminMode(loggedIn);
      const cached = localStorage.getItem('songCache');
      if (cached) { allSongs = JSON.parse(cached); renderAll(); fetchData(false); }
      else { fetchData(true); }
    };

    async function fetchData(showUI = false) {
      const songs = await callGAS({ action: "getSongs" }, showUI);
      if (songs) { allSongs = songs; localStorage.setItem('songCache', JSON.stringify(songs)); renderAll(); }
    }

    function renderAll() {
      const counts = {}; let ohmoriTotal = 0;
      allSongs.forEach(s => { if (OHMORI_GROUP.includes(s.artist)) ohmoriTotal++; else counts[s.artist] = (counts[s.artist] || 0) + 1; });
      const majorArtists = Object.keys(counts).filter(a => counts[a] >= 10).sort();
      const tabs = [{ id: "すべて", label: `すべて (${allSongs.length})` }, { id: "最近歌った順", label: "最近歌った順" }];
      if (ohmoriTotal > 0) tabs.push({ id: "大森元貴曲", label: `大森元貴曲 (${ohmoriTotal})` });
      majorArtists.forEach(name => tabs.push({ id: name, label: `${name} (${counts[name]})` }));
      const container = document.getElementById('tabContainer');
      container.innerHTML = '';
      tabs.forEach(tab => {
        const div = document.createElement('div');
        div.className = `artist-tab ${tab.id === currentTab ? 'active' : ''}`;
        div.innerText = tab.label;
        div.onclick = () => { currentTab = tab.id; renderAll(); };
        container.appendChild(div);
      });
      filterSongs();
    }

    function filterSongs() {
      const query = document.getElementById('searchBox')?.value.toLowerCase() || "";
      const container = document.getElementById('songList');
      container.innerHTML = '';
      let f = [...allSongs];
      if (currentTab === "大森元貴曲") f = f.filter(s => OHMORI_GROUP.includes(s.artist));
      else if (currentTab === "最近歌った順") f.sort((a,b) => new Date(b.lastSung) - new Date(a.lastSung));
      else if (currentTab !== "すべて") f = f.filter(s => s.artist === currentTab);
      if (query) f = f.filter(s => s.name.toLowerCase().includes(query) || s.artist.toLowerCase().includes(query));
      f.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'songBtn';
        btn.onclick = () => onSongTap(s);
        const dateStr = (s.lastSung && s.lastSung !== "1900-01-01") ? s.lastSung : "";
        btn.innerHTML = `<div class="btn-main"><span class="btn-title">${s.name}</span><span class="btn-artist">${s.artist}</span></div><span class="btn-date">${dateStr}</span>`;
        container.appendChild(btn);
      });
    }

    function onSongTap(song, isFromRequest = false, requestId = null) {
      if (IS_ADMIN) {
        document.getElementById('confirmTitle').innerText = song.name;
        document.getElementById('confirmOverlay').style.display = 'flex';
        document.getElementById('execSingBtn').onclick = async () => {
          if (!isRunning) return alert("STARTを押してください");
          executeSing(song);
          if (isFromRequest && requestId) callGAS({ action: "deleteRequest", id: requestId }, false);
          closeConfirm();
          if (isFromRequest) closeRequestModal();
        };
      } else {
        if (confirm(`「${song.name}」をリクエストしますか？`)) {
          callGAS({ action: "sendRequest", name: song.name, artist: song.artist }, true).then(() => alert("送信しました！"));
        }
      }
    }

    async function checkRequests() {
      if (!IS_ADMIN) return;
      const reqs = await callGAS({ action: "getRequests" }, false);
      if (reqs) {
        currentRequests = reqs;
        const badge = document.getElementById('requestBadge');
        if (badge) { badge.innerText = reqs.length; badge.style.display = reqs.length > 0 ? 'block' : 'none'; }
      }
    }

    function openRequestModal() {
      const modal = document.getElementById('requestModal');
      const list = document.getElementById('requestList');
      modal.style.display = 'flex';
      list.innerHTML = currentRequests.length === 0 ? '<div style="text-align:center; padding:20px; color:#666;">なし</div>' : '';
      currentRequests.forEach(req => {
        const div = document.createElement('div');
        div.className = 'request-item';
        div.innerHTML = `<div style="flex:1" onclick='onSongTap({name:"${req.name}", artist:"${req.artist}"}, true, "${req.id}")'><b>${req.name}</b><br><small>${req.artist}</small></div>
        <button class="del-btn" onclick="deleteReq('${req.id}')">削除</button>`;
        list.appendChild(div);
      });
    }

    async function deleteReq(id) {
      if (confirm("削除しますか？")) { await callGAS({ action: "deleteRequest", id: id }, true); checkRequests(); openRequestModal(); }
    }

    function executeSing(song) {
      const timeStr = document.getElementById('timerDisplay').innerText;
      document.getElementById('resultArea').value += `${timeStr} ${song.name}\n`;
      if (song.id) callGAS({ action: "updateDate", id: song.id }, false);
    }

    async function addNewSong() {
      const name = document.getElementById('newSong').value;
      const artist = document.getElementById('newArtist').value;
      const status = document.getElementById('newStatus').value;
      if (!name || !artist) return alert("入力してください");
      await callGAS({ action: "addSong", name, artist, status }, true);
      alert("Notionに追加しました"); fetchData(false);
    }

    function applyAdminMode(isAdmin) {
      IS_ADMIN = isAdmin;
      localStorage.setItem('isAdminLoggedIn', isAdmin);
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? 'flex' : 'none');
      document.getElementById('guestTitle').style.display = isAdmin ? 'none' : 'block';
      document.getElementById('loginBtn').style.display = isAdmin ? 'none' : 'block';
      document.getElementById('timerDisplay').style.display = isAdmin ? 'block' : 'none';
      if (isAdmin) { clearInterval(window.reqInterval); window.reqInterval = setInterval(checkRequests, 10000); }
    }

    function switchView(view) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('page-' + view).classList.add('active');
      document.getElementById('nav-' + view).classList.add('active');
    }

    function handleAction() {
      if (!isRunning) { startTime = Date.now(); isRunning = true; updateButtonUI(true); }
      else { if (confirm("終了しますか？")) isRunning = false; updateButtonUI(false); }
    }

    function updateButtonUI(active) {
      const btn = document.getElementById('actionBtn');
      btn.innerText = active ? "🛑 STOP" : "🎥 START";
      btn.classList.toggle('active', active);
    }

    setInterval(() => {
      if (isRunning) {
        const diff = Date.now() - startTime;
        const min = Math.floor(diff / 60000);
        const sec = Math.floor((diff % 60000) / 1000);
        document.getElementById('timerDisplay').innerText = `${min}:${sec.toString().padStart(2, '0')}`;
      }
    }, 1000);

    function tryLogin() { const p = prompt("PASS?"); if (p === ADMIN_PASS) applyAdminMode(true); }
    function logout() { localStorage.setItem('isAdminLoggedIn', 'false'); location.reload(); }
    function closeConfirm() { document.getElementById('confirmOverlay').style.display = 'none'; }
    function closeRequestModal() { document.getElementById('requestModal').style.display = 'none'; }
    function copyLog() { navigator.clipboard.writeText(document.getElementById('resultArea').value); alert("コピーしました"); }
  </script>
</body>
</html>
